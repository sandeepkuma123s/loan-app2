<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loan Predictor</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== CARD ===== */
.card {
  width: 460px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  color: white;
}

/* ===== HEADER ===== */
h1 {
  font-size: 24px;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 25px;
}

/* ===== FORM ===== */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

input::placeholder {
  color: #cbd5f5;
}

/* Full width fields */
.full {
  grid-column: span 2;
}

/* ===== BUTTON ===== */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* ===== RESULT ===== */
.result {
  margin-top: 18px;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-weight: 600;
}

.approved {
  background: rgba(34,197,94,0.2);
  color: #22c55e;
}

.rejected {
  background: rgba(239,68,68,0.2);
  color: #ef4444;
}
</style>

</head>

<body>

<div class="card">
  <h1>Loan Approval</h1>
  <p class="subtitle">Check eligibility instantly</p>

  <form action="/predict" method="post" class="grid">

    <input type="number" name="ApplicantIncome" placeholder="Applicant Income" required>
    <input type="number" name="CoapplicantIncome" placeholder="Co-income" required>

    <input type="number" name="LoanAmount" placeholder="Loan Amount" required>
    <input type="number" name="Loan_Amount_Term" placeholder="Loan Term" required>

    <select name="Credit_History">
      <option value="1">Good Credit</option>
      <option value="0">Bad Credit</option>
    </select>

    <select name="Gender">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <select name="Married">
      <option value="Yes">Married</option>
      <option value="No">Single</option>
    </select>

    <select name="Education">
      <option value="Graduate">Graduate</option>
      <option value="Not Graduate">Not Graduate</option>
    </select>

    <select name="Self_Employed">
      <option value="No">Not Self-employed</option>
      <option value="Yes">Self-employed</option>
    </select>

    <select name="Property_Area">
      <option value="Urban">Urban</option>
      <option value="Semiurban">Semiurban</option>
      <option value="Rural">Rural</option>
    </select>

    <button class="full">Predict Loan Status</button>

  </form>

  {% if prediction_text %}
    <div class="result 
      {% if 'Approved' in prediction_text %}approved{% else %}rejected{% endif %}">
      {{ prediction_text }}
    </div>
  {% endif %}
</div>

</body>
</html>
